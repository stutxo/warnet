apiVersion: v1
kind: Pod
metadata:
  name: {{ include "bitcoincore.fullname" . }}
  labels:
    {{- include "bitcoincore.labels" . | nindent 4 }}
    {{- with .Values.podLabels }}
        {{- toYaml . | nindent 4 }}
    {{- end }}
    chain: {{ .Values.global.chain }}
    P2PPort: "{{ index .Values.global .Values.global.chain "P2PPort" }}"
    RPCPort: "{{ index .Values.global .Values.global.chain "RPCPort" }}"
    ZMQTxPort: "{{ .Values.global.ZMQTxPort }}"
    ZMQBlockPort: "{{ .Values.global.ZMQBlockPort }}"
    rpcpassword: {{ .Values.global.rpcpassword }}
    app: {{ include "bitcoincore.fullname" . }}
    {{- if .Values.collectLogs }}
    collect_logs: "true"
    {{- end }}
  annotations:
    init_peers: "{{ .Values.addnode | len }}"
spec:
  restartPolicy: "{{ .Values.restartPolicy }}"
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  {{- if .Values.loadSnapshot.enabled }}
  initContainers:
    - name: download-blocks
      image: alpine:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          apk add --no-cache curl
          mkdir -p /root/.bitcoin/{{ .Values.global.chain }}
          curl -L {{ .Values.loadSnapshot.url }} | tar -xz -C /root/.bitcoin/{{ .Values.global.chain }}
      volumeMounts:
        - name: data
          mountPath: /root/.bitcoin
  {{- end }}
  containers:
    - name: {{ .Chart.Name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      ports:
        - name: rpc
          containerPort: {{ index .Values.global .Values.global.chain "RPCPort" }}
          protocol: TCP
        - name: p2p
          containerPort: {{ index .Values.global .Values.global.chain "P2PPort" }}
          protocol: TCP
        - name: zmq-tx
          containerPort: {{ .Values.global.ZMQTxPort }}
          protocol: TCP
        - name: zmq-block
          containerPort: {{ .Values.global.ZMQBlockPort }}
          protocol: TCP
      livenessProbe:
        {{- toYaml .Values.livenessProbe | nindent 8 }}
      readinessProbe:
        {{- toYaml .Values.readinessProbe | nindent 8 }}
        tcpSocket:
          port: {{ index .Values.global .Values.global.chain "RPCPort" }}
      startupProbe:
        {{- toYaml .Values.startupProbe | nindent 8 }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      volumeMounts:
        {{- with .Values.volumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        - mountPath: /root/.bitcoin
          name: data
        - mountPath: /root/.bitcoin/bitcoin.conf
          name: config
          subPath: bitcoin.conf
    {{- if .Values.metricsExport }}
    - name: prometheus
      image: {{ .Values.metricsImage.repository }}:{{ .Values.metricsImage.tag }}
      imagePullPolicy: {{ .Values.metricsImage.pullPolicy }}
      ports:
        - name: prom-metrics
          containerPort: {{ .Values.prometheusMetricsPort }}
          protocol: TCP
      env:
        - name: BITCOIN_RPC_HOST
          value: "127.0.0.1"
        - name: BITCOIN_RPC_PORT
          value: "{{ index .Values.global .Values.global.chain "RPCPort" }}"
        - name: BITCOIN_RPC_USER
          value: user
        - name: BITCOIN_RPC_PASSWORD
          value: {{ .Values.global.rpcpassword }}
        {{- if .Values.metrics }}
        - name: METRICS
          value: {{ .Values.metrics }}
        {{- end }}
    {{- end}}
    {{- if .Values.charApp.enabled }}
    - name: char-app
      image: {{ .Values.charApp.image.repository }}:{{ .Values.charApp.image.tag }}
      imagePullPolicy: {{ .Values.charApp.image.pullPolicy }}
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CHAR_RPC_HOST
          value: "127.0.0.1"
        - name: CHAR_RPC_PORT
          value: "{{ index .Values.global .Values.global.chain "RPCPort" }}"
        - name: CHAR_RPC_USER
          value: user
        - name: CHAR_RPC_PASSWORD
          value: {{ .Values.global.rpcpassword }}
        - name: CHAR_ZMQ_URL
          value: "tcp://127.0.0.1:{{ .Values.charApp.zmqPort | default .Values.global.ZMQBlockPort }}"
        - name: CHAR_DOMAIN_INFO
          value: {{ .Values.charApp.domainInfo | quote }}
        - name: CHAR_DOMAIN_PREIMAGE
          value: {{ .Values.charApp.domainPreimage | quote }}
        - name: CHAR_POLL_INTERVAL_SECONDS
          value: "{{ .Values.charApp.pollIntervalSeconds }}"
        - name: CHAR_DECISION_SCAN_WINDOW
          value: "{{ .Values.charApp.decisionScanWindow }}"
    {{- end }}
    {{- if .Values.netem.enabled }}
    - name: netem
      image: {{ .Values.netem.image.repository }}:{{ .Values.netem.image.tag }}
      imagePullPolicy: {{ .Values.netem.image.pullPolicy }}
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
      command: ["/bin/sh", "-c"]
      args:
        - |
          {{- .Values.netem.setupCommand | nindent 10 }}
          while true; do sleep 3600; done
    {{- end }}
    {{- with .Values.extraContainers }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  volumes:
    {{- with .Values.volumes }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    - name: data
      {{- if .Values.persistence.enabled }}
      {{- if .Values.persistence.existingClaim }}
      persistentVolumeClaim:
        claimName: {{ .Values.persistence.existingClaim }}
      {{- else }}
      persistentVolumeClaim:
        claimName: {{ include "bitcoincore.fullname" . }}.{{ .Release.Namespace }}-bitcoincore-data
      {{- end }}
      {{- else }}
      emptyDir: {}
      {{- end }}
    - name: config
      configMap:
        name: {{ include "bitcoincore.fullname" . }}
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
